name: Build PDF

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: texlive/texlive:TL2025-historic
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        run: latexmk main.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: midterm-report-pdf
          path: main.pdf
          if-no-files-found: error

      # コンテナジョブのデフォルトシェルは sh (dash) なので POSIX 構文のみ使う
      - name: Prepare Pages site
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp main.pdf _site/
          SHORT_SHA=$(printf '%.7s' "$GITHUB_SHA")
          BUILD_DATE=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')
          sed -e "s/{{COMMIT}}/$SHORT_SHA/" \
              -e "s/{{DATE}}/$BUILD_DATE/" \
              site/index.html > _site/index.html

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
