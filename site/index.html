<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中間報告書 PDF</title>
<style>
  :root {
    --bg: #f6f7f9;
    --fg: #1c1e21;
    --muted: #6b7280;
    --card: #ffffff;
    --accent: #2563eb;
    --border: #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181d;
      --fg: #e5e7eb;
      --muted: #9ca3af;
      --card: #1f2329;
      --accent: #60a5fa;
      --border: #33383f;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }
  header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.5rem 1rem;
    padding: 0.75rem 1.25rem;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  h1 { font-size: 1.05rem; font-weight: 600; }
  .meta { color: var(--muted); font-size: 0.8rem; }
  .meta code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .spacer { flex: 1; }
  a.btn {
    display: inline-block;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
  }
  a.repo { color: var(--muted); font-size: 0.8rem; text-decoration: none; }
  a.repo:hover { text-decoration: underline; }
  main { flex: 1; min-height: 0; }
  iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
<header>
  <h1>中間報告書</h1>
  <span class="meta">更新: {{DATE}} / <code>{{COMMIT}}</code></span>
  <span class="spacer"></span>
  <a class="repo" href="https://github.com/mathematical-modeling-project-2026/midterm-report">GitHub</a>
  <a class="btn" href="main.pdf" download>PDFをダウンロード</a>
</header>
<main>
  <iframe src="main.pdf" title="中間報告書 PDF"></iframe>
</main>
